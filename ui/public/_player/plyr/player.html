<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="{{description}}" />
		<meta name="author" content="datarhei restreamer" />
		<title>{{name}}</title>
		<link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
		<link
			rel="alternate"
			type="application/json+oembed"
			href="channels/{{channelid}}/oembed.json"
			title="{{name}}"
		/>
		<link
			rel="alternate"
			type="text/xml+oembed"
			href="channels/{{channelid}}/oembed.xml"
			title="{{name}}"
		/>
		<script src="channels/{{channelid}}/config.js"></script>
		<link href="player/plyr/dist/plyr-public.css" rel="stylesheet" />
	</head>
	<body>
		<div style="position: absolute; top: 0; right: 0; bottom: 0; left: 0">
			<video
				id="player"
				class="rs-plyr-media"
				controls
				playsinline
				crossorigin
			></video>
		</div>
		<script src="player/plyr/dist/plyr-public.js"></script>
		<script>
			function getQueryParam(key, defaultValue) {
				var query = window.location.search.substring(1);
				var vars = query.split('&');
				for (var i = 0; i < vars.length; i++) {
					var pair = vars[i].split('=');
					if (pair[0] == key) {
						return pair[1];
					}
				}
				return defaultValue;
			}

			function convertBoolParam(key, defaultValue) {
				var val = getQueryParam(key, defaultValue);
				return (
					val === true ||
					val === 'true' ||
					val === '1' ||
					val === 'yes' ||
					val === 'on'
				);
			}

			var autoplay = convertBoolParam('autoplay', playerConfig.autoplay);
			var mute = convertBoolParam('mute', playerConfig.mute);

			window.RestreamerPlyr.createPlayer({
				playerId: 'player',
				autoplay: autoplay,
				mute: mute,
				airplay: playerConfig.airplay,
			});
		</script>
	</body>
</html>
